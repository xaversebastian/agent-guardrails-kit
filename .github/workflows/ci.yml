name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y shellcheck ripgrep
      - name: Install shellcheck (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck ripgrep
      - name: Run fixture suite
        run: ./test/run.sh --runtime all
